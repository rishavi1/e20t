<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>India E20t</title>

<style>

/* ===== RESET ===== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

/* ===== TOP ALERT ===== */
.notice{
    background:#0b2a5b;
    color:#fff;
    text-align:center;
    padding:6px;
    font-size:13px;
}

/* ===== HEADER ===== */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px;
    background:#fff;
    position:relative;
}

.logo{
    font-weight:bold;
    color:#0b2a5b;
}

.icons{
    display:flex;
    gap:10px;
}

.icons span{
    cursor:pointer;
}

/* ===== ADDED NAV MENU ===== */
.nav-menu{
    position:absolute;
    top:60px;
    right:0;
    width:100%;
    background:#0b2a5b;
    display:none;
    flex-direction:column;
    z-index:999;
}

.nav-menu a{
    color:#fff;
    padding:12px;
    text-decoration:none;
    border-bottom:1px solid rgba(255,255,255,0.2);
}

.nav-menu.show{
    display:flex;
}

/* ===== HERO SECTION ===== */
.hero{
    position:relative;
    overflow:hidden;
    background:#111213;
    background-image: url(../img/banner.jpeg);
    color:#fff;
}

.hero::after{
    content:"";
    position:absolute;
    right:-30%;
    top:0;
    width:70%;
    height:100%;
    background:url('https://images.unsplash.com/photo-1581090700227-1e8b0e41c1cb') no-repeat center/cover;
    transform:skewX(-20deg);
}

.hero-content{
    position:relative;
    z-index:2;
    padding:30px 15px;
}

.hero h1{
    font-size:22px;
}

.hero p{
    margin:10px 0;
    font-size:14px;
}

.btn{
    background:#ffcc00;
    color:#000;
    padding:10px 15px;
    border:none;
    cursor:pointer;
    margin-top:10px;
}

.phone{
    position:absolute;
    right:10%;
    top:20%;
    width:120px;
    z-index:3;
}



.hero{
    position:relative;
    overflow:hidden;
    color:#fff;

    /* 🔥 background image */
    background:url('img/banner.jpeg') no-repeat center/cover;

    min-height:300px;
}

/* dark overlay for text visibility */
.hero::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
}

/* remove old angled blue shape */
.hero::after{
    display:none;
}

.phone img{
    width:100%;
}

/* ===== DOTS ===== */
.dots{
    text-align:center;
    padding:10px;
}

.dot{
    width:8px;
    height:8px;
    background:#ccc;
    display:inline-block;
    border-radius:50%;
    margin:3px;
}

.dot.active{
    background:#1f5fa7;
}

/* ===== OFFERINGS ===== */
.offerings{
    padding:20px;
    text-align:center;
}

.offerings h2{
    color:#1f5fa7;
    margin-bottom:15px;
}

.cards{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.card{
    background:#eee;
    padding:15px;
    border-radius:6px;
    text-align:left;
    font-weight:bold;
    cursor:pointer;
}

.card.main{
    background:#2f6fad;
    color:#fff;
}

/* ===== FLOAT BUTTON ===== */
.ask-btn{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#1f5fa7;
    color:#fff;
    padding:12px 16px;
    border-radius:25px;
    cursor:pointer;
}

/* ===== DESKTOP ===== */
@media(min-width:768px){

    .hero{
        height:500px;
    }

    .hero-content{
        padding:80px;
        width:50%;
    }

    .hero h1{
        font-size:40px;
    }

    .phone{
        width:220px;
        top:15%;
    }

    .cards{
        flex-direction:row;
        flex-wrap:wrap;
        justify-content:center;
    }

    .card{
        width:180px;
        text-align:center;
    }

    .card.main{
        width:100%;
        text-align:left;
    }

    /* desktop nav */
    .nav-menu{
        position:static;
        display:flex !important;
        flex-direction:row;
        background:none;
        width:auto;
    }

    .nav-menu a{
        color:#333;
        border:none;
        padding:0 10px;
    }

    .icons span:last-child{
        display:none;
    }
}

</style>
</head>

<body>

<!-- ===== NOTICE ===== -->
<div class="notice">
    <Marquee></Marquee>
⚠️ CAUTION ALERT! Beware of fake petrol pump websites.
</div>

<!-- ===== HEADER ===== -->
<div class="header">
    <div class="logo">BPCL Clone</div>

    <div class="icons">
        <span>🔍</span>
        <span id="menuBtn">☰</span>
    </div>

    <!-- ✅ ADDED MENU -->
    <div class="nav-menu" id="navMenu">
        <a href="index.html">Home</a>
        <a href="about.html">About Us</a>
        <a href="services.html">Services</a>
        <a href="contact.html">Contact</a>
    </div>

</div>

<!-- ===== HERO ===== -->
<section class="hero">


    <div class="phone">
        <img src="https://via.placeholder.com/200x400" />
    </div>

</section>

<!-- dots -->
<div class="dots">
    <span class="dot active"></span>
    <span class="dot"></span>
    <span class="dot"></span>
</div>

<!-- ===== OFFERINGS ===== -->
<section class="offerings">

    <h2>OUR OFFERINGS</h2>

    <div class="cards">

        <div class="card main">
            Fuel & Services <br><br>
            Bharat Petroleum is committed towards serving its customers...
        </div>

        <div class="card">Bharatgas</div>
        <div class="card">MAK Lubricants</div>
        <div class="card">Refineries</div>
        <div class="card">Gas</div>
        <div class="card">Industrial</div>
        <div class="card">International</div>
        <div class="card">Testing</div>

    </div>

</section>

<!-- ===== FLOAT BUTTON ===== -->
<div class="ask-btn">💬 Ask</div>

<script>

/* slider dots */
let dots = document.querySelectorAll(".dot");
let i = 0;

setInterval(()=>{
    dots.forEach(d=>d.classList.remove("active"));
    dots[i].classList.add("active");
    i = (i+1)%dots.length;
},3000);

/* ✅ MENU TOGGLE */
document.getElementById("menuBtn").onclick = function(){
    document.getElementById("navMenu").classList.toggle("show");
};

</script>

</body>
</html>
